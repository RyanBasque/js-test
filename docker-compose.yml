services:
  mysql:
    image: mysql:8.0
    container_name: app_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: app_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: app_db
      DB_USER: root
      DB_PASS: secret
      JWT_SECRET: docker_dev_secret_change_in_production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/packages/backend/src

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: app_frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src

volumes:
  mysql_data:
